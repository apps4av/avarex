name: Android

on: push

jobs:

  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
      - name: Set app version
        run: |
          echo "APP_VERSION=$(sed -n 's/^version: //p' pubspec.yaml)" >> "$GITHUB_ENV"
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.35.1'

      - name: Find and Replace NMS FAA
        uses: richardrigutins/replace-in-files@v2
        with:
          files: '**/*.dart'
          search-text: '@@__faa_nms_api_client_id_secret__@@'
          replacement-text: ${{ secrets.FAA_NMS_API_CLIENT_ID_SECRET }}
          encoding: 'utf8'
          max-parallelism: 10

      - name: Find and Replace RC Key
        uses: richardrigutins/replace-in-files@v2
        with:
          files: '**/*.dart'
          search-text: '@@___revenuecat_android_api_key__@@'
          replacement-text: ${{ secrets.ANDROID_REVENUECAT_API_KEY }}
          encoding: 'utf8'
          max-parallelism: 10

      - name: Install project dependencies
        run: flutter pub get

      - name: Login to Firebase
        run: |
          curl -sL https://firebase.tools | bash
          echo -n ${{ secrets.GOOGLE_SERVICES_KEY }} | base64 -d > key.json
          export GOOGLE_APPLICATION_CREDENTIALS="key.json"
          dart pub global activate flutterfire_cli
          flutterfire configure --project avarex-479ae --platforms android --yes

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build APK
        run: flutter build apk --release

      - name: Sign APK with keystore
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: build/app/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEY_STORE }}
          alias: ${{ secrets.KEY_STORE_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASS }}
          keyPassword: ${{ secrets.KEY_STORE_PASS }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Sign AAB with keystore
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: build/app/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEY_STORE }}
          alias: ${{ secrets.KEY_STORE_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASS }}
          keyPassword: ${{ secrets.KEY_STORE_PASS }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Prepare upload artifacts
        run: |
          mkdir -p build/artifacts
          cp "${{ steps.sign_apk.outputs.signedReleaseFile }}" "build/artifacts/avarex_android_${APP_VERSION}_${{ github.ref_name }}.apk"
          cp "${{ steps.sign_aab.outputs.signedReleaseFile }}" "build/artifacts/avarex_android_${APP_VERSION}_${{ github.ref_name }}.aab"

      - name: Upload release
        uses: appleboy/scp-action@v0.1.7
        with:
          host: apps4av.org
          username: apps4av
          password: ${{ secrets.MAMBA_PASSWORD }}
          port: 22
          strip_components: 2
          source: build/artifacts/*
          target: /home/apps4av/builds

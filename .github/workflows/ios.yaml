name: IOS

on: push

jobs:

  build-and-release:
    runs-on: macos-26

    steps:

      - uses: actions/checkout@v4
      - uses: futureware-tech/simulator-action@v4
        with:
          model: 'iPhone 17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.35.1'

      - name: Find and Replace NMS FAA
        uses: richardrigutins/replace-in-files@v2
        with:
          files: '**/*.dart'
          search-text: '@@__faa_nms_api_client_id_secret__@@'
          replacement-text: ${{ secrets.FAA_NMS_API_CLIENT_ID_SECRET }}
          encoding: 'utf8'
          max-parallelism: 10

      - name: Find and Replace RC Key
        uses: richardrigutins/replace-in-files@v2
        with:
          files: '**/*.dart'
          search-text: '@@___revenuecat_ios_api_key__@@'
          replacement-text: ${{ secrets.IOS_REVENUECAT_API_KEY }}
          encoding: 'utf8'
          max-parallelism: 10

      - name: Install the Apple certificate and provisioning profile
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          # import certificate and provisioning profile from secrets
          echo -n ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }} | base64 --decode --output $CERTIFICATE_PATH
          echo -n ${{ secrets.IOS_MOBILE_PROVISIONING_PROFILE_BASE64 }} | base64 --decode --output $PP_PATH
          # create temporary keychain
          security create-keychain -p ${{ secrets.IOS_GITHUB_KEYCHAIN_PASSWORD }} $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p ${{ secrets.IOS_GITHUB_KEYCHAIN_PASSWORD }} $KEYCHAIN_PATH
          # import certificate to keychain
          security import $CERTIFICATE_PATH -P ${{ secrets.IOS_BUILD_CERTIFICATE_PASSWORD }} -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
          xcodebuild -downloadPlatform iOS 

      - name: Install project dependencies
        run: flutter pub get

      - name: Login to Firebase
        run: |
          curl -sL https://firebase.tools | bash
          echo -n ${{ secrets.GOOGLE_SERVICES_KEY }} | base64 -d > key.json
          export GOOGLE_APPLICATION_CREDENTIALS="key.json"
          dart pub global activate flutterfire_cli
          flutterfire configure --project avarex-479ae --platforms ios --yes

      - name: Build artifacts
        run: flutter build ipa --release --export-options-plist=ios/GithubActionsExportOptions.plist

      - name: Upload Artifact
        run: |
          ASKPASS_SCRIPT="$RUNNER_TEMP/apps4av_ssh_askpass.sh"
          printf '#!/usr/bin/env bash\nprintf "%%s\\n" "$MAMBA_PASSWORD"\n' > "$ASKPASS_SCRIPT"
          chmod 700 "$ASKPASS_SCRIPT"
          export SSH_ASKPASS="$ASKPASS_SCRIPT"
          export SSH_ASKPASS_REQUIRE=force
          export DISPLAY=none
          scp -o StrictHostKeyChecking=accept-new build/ios/ipa/*.ipa apps4av@apps4av.org:/home/apps4av/builds/
        env:
          MAMBA_PASSWORD: ${{ secrets.MAMBA_PASSWORD }}

      - name: Clean up keychain and provisioning profile
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision
          
  

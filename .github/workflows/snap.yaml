name: Snap-Linux

on: push

jobs:

  build-and-release:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: Set snap version
        run: |
          echo "APP_VERSION=$(sed -n 's/^version: //p' snap/snapcraft.yaml)" >> "$GITHUB_ENV"
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.35.1'

      - name: Find and Replace NMS FAA
        uses: richardrigutins/replace-in-files@v2
        with:
          files: '**/*.dart'
          search-text: '@@__faa_nms_api_client_id_secret__@@'
          replacement-text: ${{ secrets.FAA_NMS_API_CLIENT_ID_SECRET }}
          encoding: 'utf8'
          max-parallelism: 10

      - name: Update source repo
        run: sudo apt-get update
      - name: Pre-empt libunwind issue for gstreamer
        run: sudo apt-get install -y libunwind-dev
      - name: Install audioplayers dependencies
        run: sudo apt-get install -y libgstreamer1.0-dev libwebkit2gtk-4.0-dev libgstreamer-plugins-base1.0-dev
      - name: Install dependencies
        run: sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      # Node 22.23.0 / 24.17.0 / 26 shipped an http.Agent keep-alive
      # regression that breaks firebase-tools ADC auth (firebase-tools#10716),
      # which makes `flutterfire configure` hang on an interactive prompt.
      # Pin to a fixed Node release.
      - uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'

      - name: Login to Firebase
        run: |
          # Pinned: firebase-tools 15.22.2 has an ADC/service-account auth
          # regression (firebase-tools#10716) that makes `flutterfire
          # configure` hang on an interactive "create project?" prompt.
          # Unpin once a fixed release ships.
          npm install -g firebase-tools@15.22.1
          echo -n ${{ secrets.GOOGLE_SERVICES_KEY }} | base64 -d > key.json
          export GOOGLE_APPLICATION_CREDENTIALS="key.json"
          dart pub global activate flutterfire_cli
          # Redirect stdin so any unexpected prompt fails fast instead of
          # hanging the runner waiting on interactive input.
          flutterfire configure --project avarex-479ae --platforms android --yes < /dev/null

      - name: Install Snapcraft
        uses: samuelmeuli/action-snapcraft@v2

      - name: Build Snap Image
        run: sudo snapcraft --destructive-mode

      - name: Prepare upload artifact
        run: |
          mkdir -p build/artifacts
          cp avarex*.snap "build/artifacts/avarex_snap_${APP_VERSION}_${{ github.ref_name }}.snap"
          
      - name: Upload Artifact
        uses: appleboy/scp-action@v0.1.7
        with:
          host: apps4av.org
          username: apps4av
          password: ${{ secrets.MAMBA_PASSWORD }}
          port: 22
          strip_components: 2
          source: build/artifacts/*
          target: /home/apps4av/builds
